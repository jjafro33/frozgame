<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
#app{width:100%;height:600px;position:relative;overflow:hidden;font-family:'Rajdhani',sans-serif}
canvas{display:block;width:100%;height:100%}
#home{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a0a2e 0%,#1a0a3e 40%,#2d0a1e 100%);z-index:10}
#home.hidden{display:none}
.city-bg{position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(180deg,transparent,#0d0d2e);display:flex;align-items:flex-end}
.title-wrap{text-align:center;margin-bottom:40px;position:relative}
.title-main{font-family:'Bangers',cursive;font-size:72px;color:#fff;text-shadow:0 0 30px #f90,0 0 60px #f60,4px 4px 0 #c00;letter-spacing:4px;line-height:1;animation:titlePulse 2s ease-in-out infinite}
.title-sub{font-family:'Bangers',cursive;font-size:28px;color:#ffd700;text-shadow:0 0 10px #fa0;letter-spacing:8px;margin-top:4px}
@keyframes titlePulse{0%,100%{transform:scale(1) skewX(0deg)}50%{transform:scale(1.04) skewX(-2deg)}}
.runner-anim{width:80px;height:80px;margin:0 auto 20px;position:relative}
.runner-svg{animation:runnerBob 0.5s ease-in-out infinite alternate}
@keyframes runnerBob{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.btn-wrap{display:flex;gap:20px;margin-top:10px}
.btn{font-family:'Bangers',cursive;font-size:28px;letter-spacing:3px;padding:14px 48px;border:none;border-radius:50px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);transform:translateX(-100%);transition:transform 0.2s}
.btn:hover::before{transform:translateX(0)}
.btn:active{transform:scale(0.96)}
.btn-play{background:linear-gradient(135deg,#ff6b00,#ff0080);color:#fff;box-shadow:0 4px 20px rgba(255,100,0,0.6),0 0 0 3px rgba(255,100,0,0.3)}
.btn-shop{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,0.6),0 0 0 3px rgba(124,58,237,0.3)}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
#gameWrap{position:absolute;inset:0;display:none}
#gameWrap.active{display:block}
#gameCanvas{width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);pointer-events:none}
#scoreDisplay{font-family:'Bangers',cursive;font-size:32px;color:#ffd700;text-shadow:0 0 10px #fa0;letter-spacing:2px}
#coinsDisplay{font-family:'Bangers',cursive;font-size:24px;color:#ffd700;display:flex;align-items:center;gap:6px}
.coin-icon{width:20px;height:20px;background:radial-gradient(circle at 35% 35%,#ffe066,#f90);border-radius:50%;display:inline-block}
#liveCounter{font-family:'Bangers',cursive;font-size:22px;color:#ff4444;letter-spacing:2px}
#controls{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:10px;pointer-events:none;opacity:0.5}
.ctrl-hint{font-family:'Rajdhani',sans-serif;font-size:12px;color:#fff;background:rgba(255,255,255,0.15);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.2)}
#gameOver{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#gameOver.show{display:flex}
#gameOver h2{font-family:'Bangers',cursive;font-size:64px;color:#ff2244;text-shadow:0 0 30px #f00;letter-spacing:4px;animation:shake 0.3s ease-in-out}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#gameOver .final-score{font-family:'Bangers',cursive;font-size:36px;color:#ffd700;margin:10px 0 30px}
.btn-sm{font-family:'Bangers',cursive;font-size:24px;padding:10px 36px;border:none;border-radius:40px;cursor:pointer;transition:all 0.15s}
.btn-restart{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,0.5)}
.btn-menu{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,0.5);margin-left:12px}
.btn-sm:active{transform:scale(0.95)}
#shop{position:absolute;inset:0;background:linear-gradient(180deg,#0f0f2e,#1e0938);display:none;flex-direction:column;align-items:center;padding:30px 20px;z-index:10;overflow-y:auto}
#shop.show{display:flex}
#shop h2{font-family:'Bangers',cursive;font-size:48px;color:#ffd700;letter-spacing:4px;text-shadow:0 0 20px #fa0;margin-bottom:6px}
.shop-sub{color:#a78bfa;font-size:14px;letter-spacing:2px;margin-bottom:24px}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:480px}
.shop-item{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.shop-item:hover{border-color:rgba(255,200,0,0.5);background:rgba(255,200,0,0.08);transform:translateY(-2px)}
.shop-item.owned{border-color:#10b981;background:rgba(16,185,129,0.1)}
.shop-item.selected{border-color:#ffd700;background:rgba(255,215,0,0.12);box-shadow:0 0 16px rgba(255,215,0,0.3)}
.item-icon{font-size:36px;margin-bottom:6px;display:block}
.item-name{font-family:'Bangers',cursive;font-size:16px;color:#fff;letter-spacing:1px}
.item-price{font-size:12px;color:#ffd700;margin-top:4px}
.owned-badge{position:absolute;top:6px;right:6px;background:#10b981;color:#fff;font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;padding:2px 6px;border-radius:8px}
.btn-back{font-family:'Bangers',cursive;font-size:22px;padding:8px 28px;border:none;border-radius:30px;background:rgba(255,255,255,0.12);color:#fff;cursor:pointer;margin-top:20px;border:1px solid rgba(255,255,255,0.2);transition:all 0.15s}
.btn-back:hover{background:rgba(255,255,255,0.2)}
#shopCoins{font-family:'Bangers',cursive;font-size:22px;color:#ffd700;display:flex;align-items:center;gap:6px;margin-bottom:16px}
.combo-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Bangers',cursive;font-size:40px;color:#ffd700;text-shadow:0 0 20px #fa0;pointer-events:none;transition:all 0.2s;z-index:30;white-space:nowrap}
.combo-badge.pop{transform:translate(-50%,-80%) scale(1)}
</style>
</head>
<body>
<div id="app">
  <div class="stars" id="stars"></div>

  <div id="home">
    <div class="city-bg"></div>
    <div class="title-wrap">
      <div class="runner-anim">
        <svg class="runner-svg" viewBox="0 0 60 80" fill="none" xmlns="http://www.w3.org/2000/svg" width="60" height="80">
          <circle cx="30" cy="10" r="9" fill="#FFD580"/>
          <rect x="20" y="20" width="20" height="22" rx="4" fill="#FF6B00"/>
          <line x1="20" y1="32" x2="10" y2="44" stroke="#FFD580" stroke-width="4" stroke-linecap="round"/>
          <line x1="40" y1="32" x2="50" y2="44" stroke="#FFD580" stroke-width="4" stroke-linecap="round"/>
          <line x1="22" y1="42" x2="16" y2="60" stroke="#1e40af" stroke-width="5" stroke-linecap="round"/>
          <line x1="38" y1="42" x2="44" y2="60" stroke="#1e40af" stroke-width="5" stroke-linecap="round"/>
          <rect x="14" y="58" width="12" height="6" rx="3" fill="#fff"/>
          <rect x="34" y="58" width="12" height="6" rx="3" fill="#fff"/>
        </svg>
      </div>
      <div class="title-main">SUBWAY</div>
      <div class="title-main" style="color:#ff0080;text-shadow:0 0 30px #f0f,0 0 60px #a0f,4px 4px 0 #700">SURFERS</div>
      <div class="title-sub">ENDLESS RUN</div>
    </div>
    <div class="btn-wrap">
      <button class="btn btn-play" id="btnPlay">▶ PLAY</button>
      <button class="btn btn-shop" id="btnShop">🛍 SHOP</button>
    </div>
    <div style="margin-top:24px;color:rgba(255,255,255,0.4);font-size:13px;letter-spacing:2px">↑ JUMP &nbsp;|&nbsp; ← → LANE &nbsp;|&nbsp; ↓ SLIDE</div>
  </div>

  <div id="shop">
    <h2>SHOP</h2>
    <div class="shop-sub">SPEND YOUR COINS</div>
    <div id="shopCoins"><span class="coin-icon"></span><span id="shopCoinAmt">0</span> COINS</div>
    <div class="shop-grid" id="shopGrid"></div>
    <button class="btn-back" id="btnBack">← BACK</button>
  </div>

  <div id="gameWrap">
    <canvas id="gameCanvas" width="480" height="600"></canvas>
    <div id="hud">
      <div id="scoreDisplay">0 m</div>
      <div id="coinsDisplay"><span class="coin-icon"></span><span id="coinCount">0</span></div>
      <div id="liveCounter">❤️❤️❤️</div>
    </div>
    <div id="controls">
      <span class="ctrl-hint">← → LANES</span>
      <span class="ctrl-hint">↑ JUMP</span>
      <span class="ctrl-hint">↓ SLIDE</span>
    </div>
  </div>

  <div id="gameOver">
    <h2>GAME OVER</h2>
    <div class="final-score" id="finalScore">0 m</div>
    <div style="display:flex;gap:0">
      <button class="btn-sm btn-restart" id="btnRestart">▶ RESTART</button>
      <button class="btn-sm btn-menu" id="btnMenu">🏠 MENU</button>
    </div>
  </div>
  <div class="combo-badge" id="comboBadge">NICE!</div>
</div>

<script>
const SHOP_ITEMS=[
  {id:'jake',name:'JAKE',icon:'🏃',price:0,owned:true},
  {id:'tricky',name:'TRICKY',icon:'🧢',price:500,owned:false},
  {id:'fresh',name:'FRESH',icon:'🕶️',price:800,owned:false},
  {id:'spike',name:'SPIKE',icon:'⚡',price:1200,owned:false},
  {id:'yutani',name:'YUTANI',icon:'👾',price:1500,owned:false},
  {id:'ninja',name:'NINJA',icon:'🥷',price:2000,owned:false},
];
let shopOwned={jake:true},shopSelected='jake',totalCoins=0;

function initStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    c.appendChild(s);
  }
}

function renderShop(){
  document.getElementById('shopCoinAmt').textContent=totalCoins;
  const g=document.getElementById('shopGrid');
  g.innerHTML='';
  SHOP_ITEMS.forEach(item=>{
    const owned=shopOwned[item.id]||item.owned;
    const sel=shopSelected===item.id;
    const d=document.createElement('div');
    d.className='shop-item'+(owned?' owned':'')+(sel?' selected':'');
    d.innerHTML=`${owned?'<span class="owned-badge">OWNED</span>':''}<span class="item-icon">${item.icon}</span><div class="item-name">${item.name}</div><div class="item-price">${owned?(sel?'✓ SELECTED':'SELECT'):'🪙 '+item.price}</div>`;
    d.onclick=()=>{
      if(owned){shopSelected=item.id;renderShop();}
      else if(totalCoins>=item.price){totalCoins-=item.price;shopOwned[item.id]=true;shopSelected=item.id;renderShop();playSound('coin');}
      else{showCombo('NEED MORE COINS!');}
    };
    g.appendChild(d);
  });
}

document.getElementById('btnShop').onclick=()=>{renderShop();document.getElementById('shop').classList.add('show');playSound('click')};
document.getElementById('btnBack').onclick=()=>{document.getElementById('shop').classList.remove('show');playSound('click')};
document.getElementById('btnPlay').onclick=()=>{startGame();playSound('click')};
document.getElementById('btnRestart').onclick=()=>{document.getElementById('gameOver').classList.remove('show');startGame();playSound('click')};
document.getElementById('btnMenu').onclick=()=>{document.getElementById('gameOver').classList.remove('show');document.getElementById('gameWrap').classList.remove('active');document.getElementById('home').classList.remove('hidden');playSound('click')};

const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getAudio(){if(!actx)actx=new AudioCtx();return actx;}
function playSound(type){
  try{
    const a=getAudio();
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    const t=a.currentTime;
    if(type==='jump'){o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(600,t+0.1);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2);}
    else if(type==='coin'){o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(1320,t+0.08);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15);}
    else if(type==='hit'){o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(50,t+0.15);g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2);}
    else if(type==='slide'){o.type='triangle';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(150,t+0.12);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15);}
    else if(type==='click'){o.type='sine';o.frequency.setValueAtTime(600,t);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);o.start(t);o.stop(t+0.05);}
    else if(type==='gameover'){o.type='sawtooth';[200,180,160,120].forEach((f,i)=>setTimeout(()=>{try{const a2=getAudio(),o2=a2.createOscillator(),g2=a2.createGain();o2.connect(g2);g2.connect(a2.destination);o2.type='sawtooth';o2.frequency.value=f;g2.gain.setValueAtTime(0.3,a2.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,a2.currentTime+0.2);o2.start();o2.stop(a2.currentTime+0.2);}catch(e){}},i*120));}
  }catch(e){}
}

function showCombo(msg){
  const b=document.getElementById('comboBadge');
  b.textContent=msg;b.classList.add('pop');
  setTimeout(()=>b.classList.remove('pop'),700);
}

const cvs=document.getElementById('gameCanvas');
const ctx=cvs.getContext('2d');
const W=480,H=600;
const LANES=[120,240,360];
const GROUND=480;
let gState={};

function startGame(){
  document.getElementById('home').classList.add('hidden');
  document.getElementById('gameWrap').classList.add('active');
  document.getElementById('gameOver').classList.remove('show');
  const item=SHOP_ITEMS.find(x=>x.id===shopSelected);
  gState={
    running:true,score:0,coins:0,lives:3,
    speed:4,frame:0,bgOffset:0,
    player:{lane:1,x:LANES[1],y:GROUND-70,vy:0,jumping:false,sliding:false,slideTimer:0,invincible:0,color:item?item.icon:'🏃'},
    obstacles:[],coinItems:[],particles:[],trains:[],
    lastObstacle:60,lastCoin:40,
    coinStreak:0,
  };
  document.getElementById('scoreDisplay').textContent='0 m';
  document.getElementById('coinCount').textContent='0';
  document.getElementById('liveCounter').textContent='❤️❤️❤️';
  requestAnimationFrame(gameLoop);
}

function gameLoop(){
  if(!gState.running)return;
  gState.frame++;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function update(){
  const G=gState,p=G.player;
  G.score+=G.speed*0.05;
  G.speed=4+G.score*0.003;
  G.bgOffset=(G.bgOffset+G.speed)%H;

  if(p.jumping){p.vy+=0.7;p.y+=p.vy;if(p.y>=GROUND-70){p.y=GROUND-70;p.vy=0;p.jumping=false;}}
  if(p.sliding){p.slideTimer--;if(p.slideTimer<=0)p.sliding=false;}
  if(p.invincible>0)p.invincible--;
  p.x+=(LANES[p.lane]-p.x)*0.18;

  G.lastObstacle--;
  if(G.lastObstacle<=0){
    const type=Math.random()<0.3?'barrier':'train_barrier';
    const lane=Math.floor(Math.random()*3);
    G.obstacles.push({x:LANES[lane],y:-100,lane,type,h:type==='barrier'?50:120,w:type==='barrier'?52:64});
    G.lastObstacle=Math.max(30,80-G.speed*4);
  }

  G.lastCoin--;
  if(G.lastCoin<=0){
    const lane=Math.floor(Math.random()*3);
    const count=Math.random()<0.4?3:1;
    for(let i=0;i<count;i++)G.coinItems.push({x:LANES[lane],y:-30-i*40,lane,collected:false});
    G.lastCoin=Math.max(20,50-G.speed*2);
  }

  G.obstacles.forEach(o=>{o.y+=G.speed*1.2;});
  G.coinItems.forEach(c=>{c.y+=G.speed*1.2;});

  G.obstacles=G.obstacles.filter(o=>{
    if(o.y>H+100)return false;
    if(p.invincible>0)return true;
    const ph=p.sliding?28:58,py=p.sliding?GROUND-38:GROUND-70;
    if(Math.abs(o.x-p.x)<40&&Math.abs(o.y-(py+ph/2))<(o.h/2+ph/2)-10){
      G.lives--;updateLives();playSound('hit');p.invincible=80;
      for(let i=0;i<12;i++)G.particles.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.6)*7,life:30,color:`hsl(${Math.random()*60+10},100%,60%)`});
      if(G.lives<=0){endGame();return false;}
    }
    return true;
  });

  G.coinItems=G.coinItems.filter(c=>{
    if(c.y>H+20)return false;
    if(!c.collected&&Math.abs(c.x-p.x)<30&&Math.abs(c.y-p.y)<40){
      c.collected=true;G.coins++;totalCoins++;G.coinStreak++;playSound('coin');
      document.getElementById('coinCount').textContent=G.coins;
      if(G.coinStreak%5===0)showCombo('x'+G.coinStreak+'!');
      for(let i=0;i<6;i++)G.particles.push({x:c.x,y:c.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.8)*5,life:20,color:'#ffd700'});
      return false;
    }
    return !c.collected;
  });

  G.particles=G.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
  document.getElementById('scoreDisplay').textContent=Math.floor(G.score)+' m';
}

function updateLives(){
  const hearts=['','❤️','❤️❤️','❤️❤️❤️'];
  document.getElementById('liveCounter').textContent=hearts[Math.max(0,gState.lives)]||'';
}

function endGame(){
  gState.running=false;
  document.getElementById('finalScore').textContent=Math.floor(gState.score)+' m  🪙 '+gState.coins;
  document.getElementById('gameOver').classList.add('show');
  playSound('gameover');
}

function draw(){
  const G=gState,p=G.player;
  ctx.clearRect(0,0,W,H);

  // Deep Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#050515');sky.addColorStop(0.5,'#0a0a2e');sky.addColorStop(1,'#1a0a20');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Parallax Stars
  ctx.fillStyle='rgba(255,255,255,0.8)';
  for(let i=0;i<40;i++){
    const sx=(i*137+G.frame*0.2)%W;
    const sy=(i*97)%600;
    ctx.beginPath();ctx.arc(sx,sy,(i%3)+1,0,Math.PI*2);ctx.fill();
  }

  // Moon
  ctx.fillStyle='rgba(255,240,200,0.9)';
  ctx.beginPath();ctx.arc(400,80,25,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(10,10,40,0.9)';
  ctx.beginPath();ctx.arc(390,75,22,0,Math.PI*2);ctx.fill();

  // Cityscape (Moving parallax)
  const bOffset=(G.score*0.2)%60;
  for(let i=0;i<12;i++){
    const h=80+(i*40)%120;
    ctx.fillStyle=(i%2===0)?'#0d0d2e':'#1a0a2a';
    ctx.fillRect(i*50-bOffset,GROUND-h-20,40,h+20);
    ctx.fillStyle='rgba(255,200,100,0.2)';
    if(i%3===0)ctx.fillRect(i*50-bOffset+10,GROUND-h+10,20,20);
  }

  // Ground
  ctx.fillStyle='#1e1e3e';ctx.fillRect(0,GROUND-10,W,H-(GROUND-10));

  // Lanes
  [0,1,2].forEach(i=>{
    const lx=LANES[i];
    ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=60;ctx.beginPath();ctx.moveTo(lx,GROUND-10);ctx.lineTo(lx,H);ctx.stroke();
    // Ties
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=4;
    const yOffset=(G.bgOffset*1.5)%60;
    for(let y=GROUND+yOffset;y<H;y+=60){
        ctx.beginPath();ctx.moveTo(lx-30,y);ctx.lineTo(lx+30,y);ctx.stroke();
    }
  });

  // Obstacles
  G.obstacles.forEach(o=>{
    if(o.type==='train_barrier'){
      // Train
      const grad=ctx.createLinearGradient(o.x-32,o.y,o.x+32,o.y);
      grad.addColorStop(0,'#ff0055');grad.addColorStop(1,'#990033');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.roundRect(o.x-32,o.y,64,o.h,10);ctx.fill();
      // Stripes
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.fillRect(o.x-32,o.y+20,64,10);
      ctx.fillRect(o.x-32,o.y+50,64,10);
      // Windows
      ctx.fillStyle='#000';
      ctx.fillRect(o.x-24,o.y+10,16,10);ctx.fillRect(o.x+8,o.y+10,16,10);
    } else {
      // Barrier
      ctx.fillStyle='#ffaa00';
      ctx.fillRect(o.x-26,o.y,52,40);
      ctx.fillStyle='#fff';
      ctx.fillRect(o.x-26,o.y+10,52,5);ctx.fillRect(o.x-26,o.y+25,52,5);
    }
  });

  // Coins (Floating effect)
  G.coinItems.forEach(c=>{
    if(c.collected)return;
    const yBob=Math.sin(G.frame*0.1)*5;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.arc(c.x,c.y+yBob,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffae00';
    ctx.beginPath();ctx.arc(c.x,c.y+yBob,6,0,Math.PI*2);ctx.fill();
  });

  // Player
  const pY=p.sliding?GROUND-30:p.y;
  const pX=p.x;
  ctx.save();
  if(p.invincible>0&&Math.floor(G.frame/5)%2===0)ctx.globalAlpha=0.5;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.ellipse(pX,GROUND-5,25,8,0,0,Math.PI*2);ctx.fill();

  // Character Body
  const targetX = LANES[p.lane];
  const tilt = (pX - targetX) * 0.005; // Lean into the turn
  ctx.translate(pX, pY + 40);
  ctx.rotate(tilt);
  ctx.translate(-pX, -(pY + 40));

  ctx.fillStyle='#ff6b00';
  ctx.beginPath();ctx.roundRect(pX-15,pY+15,30,40,10);ctx.fill();
  ctx.fillStyle='#ffd580'; // Head
  ctx.beginPath();ctx.arc(pX,pY+10,12,0,Math.PI*2);ctx.fill();
  
  // Cap
  ctx.fillStyle='#ff0080';
  ctx.fillRect(pX-15,pY-2,30,6);
  
  ctx.restore();

  // Particles
  G.particles.forEach(pt=>{
    ctx.globalAlpha=pt.life/20;
    ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,3,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

// Controls
const keys={};
document.addEventListener('keydown',e=>{
  if(!keys[e.code]){
    keys[e.code]=true;
    const p=gState.player;
    if(!gState.running)return;
    if((e.code==='ArrowUp'||e.code==='Space')&&!p.jumping){p.jumping=true;p.vy=-14;p.sliding=false;playSound('jump');}
    if(e.code==='ArrowDown'&&!p.jumping){p.sliding=true;p.slideTimer=30;playSound('slide');}
    if(e.code==='ArrowLeft'&&p.lane>0){p.lane--;playSound('click');}
    if(e.code==='ArrowRight'&&p.lane<2){p.lane++;playSound('click');}
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// Touch
let tx=0,ty=0;
document.getElementById('gameCanvas').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault();},{passive:false});
document.getElementById('gameCanvas').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  const p=gState.player;if(!gState.running)return;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>30&&p.lane<2){p.lane++;playSound('click');}else if(dx<-30&&p.lane>0){p.lane--;playSound('click');}}
  else{if(dy<-30&&!p.jumping){p.jumping=true;p.vy=-14;playSound('jump');}else if(dy>30&&!p.jumping){p.sliding=true;p.slideTimer=30;playSound('slide');}}
  e.preventDefault();
},{passive:false});

initStars();
if(!ctx.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();};}
</script>
